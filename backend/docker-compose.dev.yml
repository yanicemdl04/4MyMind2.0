services:
  postgres:
    image: postgres:16-alpine
    container_name: formymind-db-dev
    environment:
      POSTGRES_DB: mymind_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mymind_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: formymind-redis-dev
    ports:
      - "6379:6379"

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: formymind-ai-dev
    ports:
      - "8000:8000"
    volumes:
      - ../ai-service:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  postgres_dev:
